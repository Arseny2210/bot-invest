# Alembic configuration.
#
# The database URL is NOT set here — migrations/env.py derives it from the
# application settings (or a `-x dsn=...` override), so there is a single source
# of truth and no credentials live in this file.

[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os

# Timestamped, slugged revision filenames for a readable, ordered history.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
timezone = UTC

# sqlalchemy.url is intentionally left blank (provided programmatically).
sqlalchemy.url =

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
